services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tibia-webstore-api
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Https__Enabled: ${HTTPS_ENABLED:-false}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=tibia_webstore;Username=postgres;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      Jwt__Issuer: tibia-webstore
      Jwt__Audience: tibia-webstore-client
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required}
      MercadoPago__AccessToken: ${MERCADO_PAGO_ACCESS_TOKEN:?MERCADO_PAGO_ACCESS_TOKEN is required}
      MercadoPago__PublicKey: ${MERCADO_PAGO_PUBLIC_KEY:?MERCADO_PAGO_PUBLIC_KEY is required}
      MercadoPago__WebhookSecret: ${MERCADO_PAGO_WEBHOOK_SECRET:?MERCADO_PAGO_WEBHOOK_SECRET is required}
      MercadoPago__NotificationUrl: ${MERCADO_PAGO_NOTIFICATION_URL:?MERCADO_PAGO_NOTIFICATION_URL is required}
      MercadoPago__SuccessUrl: ${MERCADO_PAGO_SUCCESS_URL:?MERCADO_PAGO_SUCCESS_URL is required}
      MercadoPago__FailureUrl: ${MERCADO_PAGO_FAILURE_URL:?MERCADO_PAGO_FAILURE_URL is required}
      MercadoPago__PendingUrl: ${MERCADO_PAGO_PENDING_URL:?MERCADO_PAGO_PENDING_URL is required}
      WhatsApp__AccessToken: ${WHATSAPP_ACCESS_TOKEN:?WHATSAPP_ACCESS_TOKEN is required}
      WhatsApp__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:?WHATSAPP_PHONE_NUMBER_ID is required}
      WhatsApp__WhatsAppBusinessId: ${WHATSAPP_BUSINESS_ID:?WHATSAPP_BUSINESS_ID is required}
      IdentityTokenDelivery__Provider: smtp
      IdentityTokenDelivery__Smtp__Host: ${SMTP_HOST:?SMTP_HOST is required}
      IdentityTokenDelivery__Smtp__Port: ${SMTP_PORT:?SMTP_PORT is required}
      IdentityTokenDelivery__Smtp__Username: ${SMTP_USERNAME:?SMTP_USERNAME is required}
      IdentityTokenDelivery__Smtp__Password: ${SMTP_PASSWORD:?SMTP_PASSWORD is required}
      IdentityTokenDelivery__Smtp__FromEmail: ${SMTP_FROM_EMAIL:?SMTP_FROM_EMAIL is required}
      IdentityTokenDelivery__Smtp__UseTls: ${SMTP_USE_TLS:?SMTP_USE_TLS is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL:-}
      Hangfire__Enabled: ${HANGFIRE_ENABLED:-true}
      Hangfire__WorkerCount: ${HANGFIRE_WORKER_COUNT:-1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lootera-net

  nginx:
    image: nginx:alpine
    container_name: tibia-webstore-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - lootera-net

  postgres:
    image: postgres:17
    container_name: tibia-webstore-postgres
    environment:
      POSTGRES_DB: tibia_webstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tibia_webstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lootera-net

volumes:
  postgres-data:

networks:
  lootera-net:
    driver: bridge
