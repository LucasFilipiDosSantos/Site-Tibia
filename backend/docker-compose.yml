services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tibia-webstore-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      Https__Enabled: ${HTTPS_ENABLED:-false}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=tibia_webstore;Username=postgres;Password=${DB_PASSWORD:-postgres}
      Jwt__Issuer: tibia-webstore
      Jwt__Audience: tibia-webstore-client
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-01234567890123456789012345678901}
      MercadoPago__Enabled: ${MERCADO_PAGO_ENABLED:-false}
      MercadoPago__AccessToken: ${MERCADO_PAGO_ACCESS_TOKEN:-}
      MercadoPago__PublicKey: ${MERCADO_PAGO_PUBLIC_KEY:-}
      MercadoPago__WebhookSecret: ${MERCADO_PAGO_WEBHOOK_SECRET:-}
      MercadoPago__NotificationUrl: ${MERCADO_PAGO_NOTIFICATION_URL:-}
      MercadoPago__SuccessUrl: ${MERCADO_PAGO_SUCCESS_URL:-}
      MercadoPago__FailureUrl: ${MERCADO_PAGO_FAILURE_URL:-}
      MercadoPago__PendingUrl: ${MERCADO_PAGO_PENDING_URL:-}
      WhatsApp__AccessToken: ${WHATSAPP_ACCESS_TOKEN:-dev-whatsapp-access-token}
      WhatsApp__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:-dev-phone-number-id}
      WhatsApp__WhatsAppBusinessId: ${WHATSAPP_BUSINESS_ID:-dev-whatsapp-business-id}
      IdentityTokenDelivery__Provider: ${IDENTITY_TOKEN_DELIVERY_PROVIDER:-inmemory}
      IdentityTokenDelivery__Smtp__Host: ${SMTP_HOST:-}
      IdentityTokenDelivery__Smtp__Port: ${SMTP_PORT:-1025}
      IdentityTokenDelivery__Smtp__Username: ${SMTP_USERNAME:-}
      IdentityTokenDelivery__Smtp__Password: ${SMTP_PASSWORD:-}
      IdentityTokenDelivery__Smtp__FromEmail: ${SMTP_FROM_EMAIL:-}
      IdentityTokenDelivery__Smtp__UseTls: ${SMTP_USE_TLS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-https://lootera.com.br}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL:-}
      Hangfire__Enabled: ${HANGFIRE_ENABLED:-true}
      Hangfire__WorkerCount: ${HANGFIRE_WORKER_COUNT:-1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lootera-net

  nginx:
    profiles: ["edge"]
    image: nginx:alpine
    container_name: tibia-webstore-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - lootera-net

  postgres:
    image: postgres:17
    container_name: tibia-webstore-postgres
    environment:
      POSTGRES_DB: tibia_webstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tibia_webstore"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - lootera-net

volumes:
  postgres-data:

networks:
  lootera-net:
    driver: bridge
