services:
  - type: web
    name: tibia-webstore-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: PORT
        value: 10000
      - key: CACHE_TTL_SECONDS
        value: 30
      - key: DATABASE_URL
        sync: false
